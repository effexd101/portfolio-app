name: My first pipeline

on: push

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: checkout code
              uses: actions/checkout@v4
            - name: Build Image
              run: |
               docker build -t ${{secrets.Docker_USERNAME}}/portfolio-app:${{github.run_number}} .
               docker build -t ${{secrets.Docker_USERNAME}}/portfolio-app .
            - name: Docker login
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKER_USERNAME}}
                password: ${{ secrets.DOCKER_PASSWORD}}

            - name: Push image to registry
              run: |
               docker push    ${{secrets.Docker_USERNAME}}/portfolio-app:${{github.run_number}}
               docker push    ${{secrets.Docker_USERNAME}}/portfolio-app               


    deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: SSh to Linux and run container      
              uses: appleboy/ssh-action@v1
              with:
                host: ${{ secrets.HOST }}
                username: ${{ secrets.SSH_USERNAME }}
                key: ${{ secrets.PRIVATE_KEY }}
                script: |
                    docker rm -f portfolio || echo "Container not found, skipping removal."
                    docker rmi -f ${{secrets.Docker_USERNAME}}/portfolio-app || echo "image do not exist"
                    docker run -d --name ciportfollio -p 8081:80 ${{secrets.Docker_USERNAME}}/portfolio-app


